name: Test OLLVM Clang

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: Download and install OLLVM clang
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          wget -q https://github.com/MPDL-Official/ollvm-plugin/releases/download/v1.0.0/ollvm-clang.tar.gz
          mkdir -p /tmp/ollvm-clang
          tar xzf ollvm-clang.tar.gz -C /tmp/ollvm-clang

          echo "--- Original NDK clang ---"
          $NDK_LLVM/bin/clang-19 --version

          echo "--- Replacing NDK clang with OLLVM clang ---"
          sudo cp $NDK_LLVM/bin/clang-19 $NDK_LLVM/bin/clang-19.bak
          sudo cp /tmp/ollvm-clang/clang-19 $NDK_LLVM/bin/clang-19
          sudo chmod +x $NDK_LLVM/bin/clang-19

          # Copy resource headers if present in the tarball
          if [ -d /tmp/ollvm-clang/clang-resource-include ]; then
            echo "--- Updating clang resource headers ---"
            sudo cp -r /tmp/ollvm-clang/clang-resource-include/* $NDK_LLVM/lib/clang/19/include/
          fi

          echo "--- Replaced NDK clang ---"
          $NDK_LLVM/bin/clang-19 --version

      - name: Test individual passes (aarch64-android)
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          CLANG="$NDK_LLVM/bin/clang"
          ARGS="--target=aarch64-none-linux-android23 --sysroot=$NDK_LLVM/sysroot -O1"

          echo "--- Test: basic compile ---"
          $CLANG $ARGS -c test/test.c -o /dev/null

          for pass in sobf fla sub bcf split icall ibr igv; do
            echo "--- Test: -mllvm -$pass ---"
            $CLANG $ARGS -mllvm -$pass -c test/test.c -o /dev/null
          done

          echo "--- Test: all passes combined ---"
          $CLANG $ARGS \
            -mllvm -sobf -mllvm -fla -mllvm -sub -mllvm -split \
            -mllvm -icall -mllvm -ibr -mllvm -igv \
            -c test/test.c -o /dev/null

      - name: Test C++ with clang++ (aarch64-android)
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          $NDK_LLVM/bin/clang++ --target=aarch64-none-linux-android23 \
            --sysroot=$NDK_LLVM/sysroot \
            -O1 -std=gnu++17 \
            -mllvm -sobf -mllvm -fla -mllvm -sub \
            -c test/test.c -o /dev/null

      - name: Test x86_64-android
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          $NDK_LLVM/bin/clang --target=x86_64-none-linux-android23 \
            --sysroot=$NDK_LLVM/sysroot \
            -O1 -mllvm -sobf -mllvm -fla -mllvm -sub \
            -c test/test.c -o /dev/null

      - name: Results
        run: echo "=== ALL TESTS PASSED ==="

name: Build OLLVM Clang

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: sudo apt-get install -y cmake ninja-build python3

      - name: Cache LLVM build
        uses: actions/cache@v4
        id: llvm-cache
        with:
          path: llvm-project/build
          key: llvm-build-${{ hashFiles('Obfuscation/**', 'patches/**') }}

      - name: Download LLVM 19.1.7 source
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-19.1.7/llvm-project-19.1.7.src.tar.xz
          tar xf llvm-project-19.1.7.src.tar.xz
          mv llvm-project-19.1.7.src llvm-project
          rm llvm-project-19.1.7.src.tar.xz

      - name: Apply OLLVM patches
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          PASSES_DIR=llvm-project/llvm/lib/Passes
          echo "--- Copying Obfuscation sources ---"
          cp -r Obfuscation $PASSES_DIR/
          echo "--- Patching PassBuilder.cpp ---"
          cp patches/PassBuilder.cpp $PASSES_DIR/PassBuilder.cpp
          echo "--- Patching CMakeLists.txt ---"
          cp patches/CMakeLists.txt $PASSES_DIR/CMakeLists.txt

      - name: Build LLVM + Clang
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          cd llvm-project
          cmake -G Ninja -B build -S llvm \
            -DLLVM_ENABLE_PROJECTS=clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_TARGETS_TO_BUILD="AArch64;X86" \
            -DLLVM_BUILD_TOOLS=OFF \
            -DLLVM_BUILD_UTILS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF
          ninja -C build clang -j$(nproc)

      - name: Test OLLVM clang
        run: |
          CLANG=llvm-project/build/bin/clang
          echo "--- clang version ---"
          $CLANG --version
          echo "--- Test: basic compile ---"
          $CLANG -O1 -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -sobf ---"
          $CLANG -O1 -mllvm -sobf -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -fla ---"
          $CLANG -O1 -mllvm -fla -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -sub ---"
          $CLANG -O1 -mllvm -sub -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -bcf ---"
          $CLANG -O1 -mllvm -bcf -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -split ---"
          $CLANG -O1 -mllvm -split -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -icall ---"
          $CLANG -O1 -mllvm -icall -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -ibr ---"
          $CLANG -O1 -mllvm -ibr -c test/test.c -o /dev/null
          echo "--- Test: -mllvm -igv ---"
          $CLANG -O1 -mllvm -igv -c test/test.c -o /dev/null
          echo "--- Test: all passes combined ---"
          $CLANG -O1 -mllvm -sobf -mllvm -fla -mllvm -sub -mllvm -split -mllvm -icall -mllvm -ibr -mllvm -igv -c test/test.c -o /dev/null
          echo "--- Test: cross-compile aarch64-android ---"
          NDK_SYSROOT=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          $CLANG --target=aarch64-none-linux-android23 --sysroot=$NDK_SYSROOT -O1 -mllvm -sobf -mllvm -fla -mllvm -sub -c test/test.c -o /dev/null
          echo "=== ALL TESTS PASSED ==="

      - name: Package clang binaries
        run: |
          mkdir -p dist
          cp llvm-project/build/bin/clang-19 dist/
          cp -r llvm-project/build/lib/clang/19/include dist/clang-resource-include
          cd dist
          ln -s clang-19 clang
          ln -s clang-19 clang++
          tar czf ollvm-clang.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollvm-clang
          path: dist/ollvm-clang.tar.gz

      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ollvm-clang.tar.gz

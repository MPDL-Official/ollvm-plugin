name: Build OLLVM Plugin

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: Install LLVM 19 dev headers
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main" | sudo tee /etc/apt/sources.list.d/llvm-19.list
          sudo apt-get update
          sudo apt-get install -y llvm-19-dev

      - name: Print versions
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          echo "NDK clang:"
          $NDK_LLVM/bin/clang --version
          echo "System LLVM 19 headers:"
          ls /usr/lib/llvm-19/include/llvm/Pass.h

      - name: Build plugin
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          mkdir build && cd build
          cmake .. \
            -DLLVM_DIR=/usr/lib/llvm-19/lib/cmake/llvm \
            -DCMAKE_C_COMPILER=$NDK_LLVM/bin/clang \
            -DCMAKE_CXX_COMPILER=$NDK_LLVM/bin/clang++ \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libObfuscation
          path: build/libObfuscation.so

      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libObfuscation.so

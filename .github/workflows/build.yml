name: Build OLLVM Plugin

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: Print clang version
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          $NDK_LLVM/bin/clang --version

      - name: Build plugin
        run: |
          NDK_LLVM=$ANDROID_HOME/ndk/28.2.13676358/toolchains/llvm/prebuilt/linux-x86_64
          echo "--- NDK LLVM structure ---"
          ls $NDK_LLVM/include/llvm/Pass.h && echo "Headers OK" || echo "No LLVM headers!"
          ls $NDK_LLVM/lib/libLLVM* 2>/dev/null || echo "No libLLVM found"
          mkdir build && cd build
          cmake .. \
            -DNDK_LLVM=$NDK_LLVM \
            -DCMAKE_C_COMPILER=$NDK_LLVM/bin/clang \
            -DCMAKE_CXX_COMPILER=$NDK_LLVM/bin/clang++ \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libObfuscation
          path: build/libObfuscation.so

      - name: Publish to Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libObfuscation.so
